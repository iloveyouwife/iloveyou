name: Build AdGuard Rules

on:
  schedule:
    - cron: "0 */6 * * *"  # 每6小时更新一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo（拉取仓库）
        uses: actions/checkout@v3

      - name: Download rules（下载规则）
        run: |
          mkdir -p rules
          while read url; do
            curl -sL "$url" >> rules/all.txt
            echo "" >> rules/all.txt
          done < lists.txt

      - name: Clean rules（去重+去注释+去空行）
        run: |
          sort rules/all.txt | uniq | grep -v '^!' | sed '/^$/d' > merged.txt

      - name: Commit result（提交结果）
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add merged.txt
          git commit -m "update rules" || echo "no changes"
          git push
