name: Build AdGuard Rules

on:
  schedule:
    - cron: "0 */6 * * *"    # 每6小时更新一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo（拉取仓库）
        uses: actions/checkout@v4

      - name: Download rules（下载规则）
        run: |
          mkdir -p rules
          echo "开始下载规则..."
          while read url; do
            echo "下载: $url"
            curl -sL "$url" >> rules/all.txt
            echo "" >> rules/all.txt
          done < lists.txt
          echo "规则下载完成！"

      - name: Clean rules（高级去重 + 优化）
        run: |
          echo "开始清理和去重规则..."
          
          # 高级清理：去注释、去空行、去首尾空格、行内空格标准化、严格去重
          awk '
            !/^[[:space:]]*[#!]/ && NF > 0 {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "");   # 去首尾空格
              gsub(/[[:space:]]+/, " ");                 # 行内多余空格标准化
              if (length($0) > 0) print
            }
          ' rules/all.txt | sort -u > merged.txt
          
          # 输出统计信息
          echo "原始合并行数: $(wc -l < rules/all.txt | awk '{print $1}')"
          echo "去重后有效规则数: $(wc -l < merged.txt | awk '{print $1}')"
          echo "规则清理完成！"

      - name: Commit result（提交结果）
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          if git diff --quiet merged.txt; then
            echo "No changes to commit"
          else
            git add merged.txt
            git commit -m "Update rules: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "规则已成功更新并推送！"
          fi
